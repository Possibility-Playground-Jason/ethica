# ABOUTME: Cloudflare Worker configuration for ethica API
# ABOUTME: Deploys via GitHub integration — auto-deploys on push, no Docker needed

name = "ethica"
main = "src/index.ts"
compatibility_date = "2025-04-01"

# Serve static files from public/ alongside the Worker API
[assets]
directory = "./public"

# Optional: GitHub token for higher API rate limits (5000/hr vs 60/hr)
# Set via: npx wrangler secret put GITHUB_TOKEN
